name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Vet
        run: cd backend && go vet ./...

      - name: Test
        run: cd backend && go test ./... -v -count=1

      - name: Build
        run: cd backend && CGO_ENABLED=0 go build -o /dev/null ./cmd/server
