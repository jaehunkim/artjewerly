services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: heeang
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/heeang?sslmode=disable"
      ADMIN_PASSWORD: "admin"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000,http://jhdesktop:3000,http://100.76.9.1:3000}"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    network_mode: host
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: "http://100.76.9.1:8080"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"

volumes:
  pgdata:
  frontend_node_modules:
