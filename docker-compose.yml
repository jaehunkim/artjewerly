services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: heeang
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/heeang?sslmode=disable"
      ADMIN_PASSWORD: "admin"
      ALLOWED_ORIGIN: "http://localhost:3000"
    depends_on:
      - db

volumes:
  pgdata:
