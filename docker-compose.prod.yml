services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: heeang
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/heeang?sslmode=disable"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost}"
      R2_ACCOUNT_ID: "${R2_ACCOUNT_ID:-}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID:-}"
      R2_SECRET_KEY: "${R2_SECRET_KEY:-}"
      R2_BUCKET_NAME: "${R2_BUCKET_NAME:-heeang-images}"
      R2_PUBLIC_URL: "${R2_PUBLIC_URL:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      TOSS_SECRET_KEY: "${TOSS_SECRET_KEY:-}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost/api}"
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost/api}"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped

  # One-shot migration runner
  migrate:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ./backend/migrations:/migrations:ro
      - ./backend/scripts:/scripts:ro
    entrypoint: >
      sh -c "
        echo 'Running migrations...' &&
        for f in /migrations/*.up.sql; do
          echo \"Applying $$f\" &&
          psql -h db -U postgres -d heeang -f $$f 2>&1 || true
        done &&
        echo 'Running seed...' &&
        psql -h db -U postgres -d heeang -f /scripts/seed.sql 2>&1 &&
        echo 'Done!'
      "
    restart: "no"

volumes:
  pgdata:
